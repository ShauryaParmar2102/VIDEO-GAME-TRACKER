<!DOCTYPE html>
<html>
    <head>
        <title>Video game Tracker</title>
        <link rel="stylesheet" href="styles.css">
            <script src="script.js"></script>

    </head>
    <body>
        <h1>🕹️ Video Game Tracker</h1>

        <div class="form">
            <input id="title" placeholder="Title">
            <input id="company" placeholder="Company">
            <input id="description" placeholder="Description">
            <button onclick="addGame()">Add Game</button>
        </div>

    <div class="controls">
            <button onclick="loadGames()">All Games</button>
            <button onclick="filterGames('Played')">Played</button>
            <button onclick="filterGames('Unplayed')">Unplayed</button>
        <input id="search" placeholder="Search for a game..." oninput="searchGames()">
    </div>

    <p id="errorMsg" class="error"></p>
    <div id="gameList"></div>
    
    </body>

</html>
